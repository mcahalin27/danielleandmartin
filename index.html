<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Danielle & Martin</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream: #faf8f4;
      --sage: #7d9b76;
      --sage-light: #a8c4a2;
      --sage-dark: #5a7a54;
      --charcoal: #2c2c2c;
      --warm-grey: #888;
      --border: #d9d4c7;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--cream);
      color: var(--charcoal);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .password-wrap {
      text-align: center;
      padding: 60px 40px;
      max-width: 480px;
      width: 100%;
    }

    .script-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.8rem, 8vw, 4.2rem);
      color: var(--charcoal);
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 20px auto 28px;
      max-width: 280px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--warm-grey);
    }

    .welcome-text {
      font-size: 1rem;
      font-style: italic;
      color: #777;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 20px;
      border: 1px solid var(--border);
      background: white;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--charcoal);
      text-align: center;
      letter-spacing: 0.15em;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }

    input[type="password"]:focus {
      border-color: var(--sage);
    }

    button {
      width: 100%;
      padding: 14px 20px;
      background: var(--sage);
      color: white;
      border: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: var(--sage-dark);
    }

    .error {
      margin-top: 14px;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      color: #b56060;
      font-style: italic;
      display: none;
    }

    .date-line {
      margin-top: 36px;
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--sage-dark);
    }
  </style>
</head>
<body>

  <div class="password-wrap">
    <div class="script-title">Danielle &amp; Martin</div>

    <div class="divider"><span>Welcome</span></div>

    <p class="welcome-text">We're so excited to celebrate with you.<br/>Please enter the password to access our wedding website.</p>

    <input type="password" id="pwd" placeholder="Enter password" onkeydown="if(event.key==='Enter') checkPassword()" />
    <button onclick="checkPassword()">Enter</button>
    <p class="error" id="error">Incorrect password — please try again.</p>

    <p class="date-line">11 · 06 · 2027 &nbsp;·&nbsp; Gloster House</p>
  </div>

  <script>
    function checkPassword() {
      const val = document.getElementById('pwd').value;
      if (val === 'dani69') {
        sessionStorage.setItem('weddingAuth', 'true');
        window.location.href = 'home.html';
      } else {
        document.getElementById('error').style.display = 'block';
        document.getElementById('pwd').value = '';
        document.getElementById('pwd').focus();
      }
    }
  </script>

</body>
</html>
